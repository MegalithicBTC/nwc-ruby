name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.2", "3.3", "3.4"]
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential automake pkg-config libtool libffi-dev libgmp-dev

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: false

      - name: Bundle install
        run: bundle install

      - name: Verify rbsecp256k1
        run: bundle exec ruby -e 'require "secp256k1"; puts "secp256k1 OK"'

      - name: Run tests
        run: bundle exec rspec

      - name: Rubocop
        run: bundle exec rubocop --no-color
